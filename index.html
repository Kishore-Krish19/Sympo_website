<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="\assets\Dept-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        const _warn = console.warn.bind(console);
        console.warn = function (...args) {
          try {
            if (args.length && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) {
              return;
            }
          } catch (e) {}
          _warn(...args);
        };
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sympo'26</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mech: ['Orbitron', 'sans-serif'],
              body: ['Rajdhani', 'sans-serif'],
            },
            colors: {
              neonBlue: '#00f3ff',
              neonOrange: '#ffaa00',
              carbon: '#111111',
              glass: 'rgba(255, 255, 255, 0.05)',
            },
            animation: {
              'spin-slow': 'spin 8s linear infinite',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 3s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #050505;
      color: #e5e5e5;
      overflow-x: hidden;
    }

    .bg-grid {
      background-size: 40px 40px;
      background-image: radial-gradient(circle, #333 1px, transparent 1px);
    }

    .carbon-fiber {
      background:
        radial-gradient(black 15%, transparent 16%) 0 0,
        radial-gradient(black 15%, transparent 16%) 8px 8px,
        radial-gradient(rgba(255, 255, 255, .1) 15%, transparent 20%) 0 1px,
        radial-gradient(rgba(255, 255, 255, .1) 15%, transparent 20%) 8px 9px;
      background-color: #111;
      background-size: 16px 16px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #111;
    }

    ::-webkit-scrollbar-thumb {
      background: #00f3ff;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ffaa00;
    }
  </style>

  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",

    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",

    "framer-motion": "https://esm.sh/framer-motion@^12.31.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "axios": "https://esm.sh/axios@^1.13.4"
  }
}
</script>

</head>
